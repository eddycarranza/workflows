name: Demostracion de un pipeline de GithubActions

on:
  push:
    branches:
      - main
      - develop

env:
  MI_NOMBRE: "Eddy Carranza Mariños"

jobs:
  saludo:
    runs-on: ubuntu-latest

    steps:
      - name: Saludo desde main
        if: github.ref == 'refs/heads/main'
        run: echo "Hola desde main, mi nombre es $MI_NOMBRE"

      - name: Saludo desde develop
        if: github.ref == 'refs/heads/develop'
        run: echo "Hola desde develop, mi nombre es $MI_NOMBRE"
